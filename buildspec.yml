version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install pytest pytest-mock  # For testing only

  pre_build:
    commands:
      - echo "Checking environment and running linting..."
      # Optional: flake8 . 

  build:
    commands:
      - echo "Running unit tests for Lambda response..."
      - python -m pytest tests/test_lambda.py

  post_build:
    commands:
      - echo "Tests passed! Packaging Lambda function..."
      - pip install -r requirements.txt -t ./package/
     
      - echo "uploading output artifacts"
    

files:
    - lambda_function.py
    - '**/*.py'
    - '**/*.so'
    - '**/*.txt'
