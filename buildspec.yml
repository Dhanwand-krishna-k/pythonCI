version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt
      - pip install pytest pytest-mock  # Essential for testing Lambda

  pre_build:
    commands:
      - echo "Checking environment and running linting..."
      - # Optional: flake8 . 

  build:
    commands:
      - echo "Running unit tests for Lambda response..."
      - # This runs your test suite
      - python -m pytest tests/test_lambda.py

  post_build:
    commands:
      - echo "Tests passed! Packaging Lambda function..."
      - zip -r deployment_package.zip . -x "tests/*" "venv/*"

artifacts:
  files:
    - deployment_package.zip

